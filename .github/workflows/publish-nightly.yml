name: Publish Nightly (Ozonator Agents Client)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  publish-nightly:
    runs-on: windows-latest

    permissions:
      contents: write

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Verify source file exists
        run: |
          if (-not (Test-Path 'OzonatorAgentsClient.pyw')) {
            throw 'Missing file: /OzonatorAgentsClient.pyw'
          }

      - name: Install build tool
        run: |
          python -m pip install --upgrade pip
          if ($LASTEXITCODE -ne 0) { throw 'pip upgrade failed' }

          python -m pip install pyinstaller
          if ($LASTEXITCODE -ne 0) { throw 'pyinstaller install failed' }

      - name: Build exe
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "OzonatorAgentsClient" `
            --hidden-import=tkinter `
            --hidden-import=tkinter.ttk `
            --hidden-import=tkinter.messagebox `
            OzonatorAgentsClient.pyw

          if ($LASTEXITCODE -ne 0) { throw 'PyInstaller build failed' }

      - name: Prepare release assets
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          $exe = Join-Path $PWD 'dist\OzonatorAgentsClient.exe'
          if (-not (Test-Path $exe)) {
            throw 'Missing build artifact: dist\\OzonatorAgentsClient.exe'
          }

          Copy-Item $exe 'release\OzonatorAgentsClient.exe' -Force
          Copy-Item 'OzonatorAgentsClient.pyw' 'release\OzonatorAgentsClient.pyw' -Force

      - name: Publish Nightly Release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly build
          prerelease: true
          allowUpdates: true
          replacesArtifacts: true
          artifacts: release\OzonatorAgentsClient.exe,release\OzonatorAgentsClient.pyw
          artifactErrorsFailBuild: true
          body: |
            Автоматическая nightly-сборка клиента из репозитория.

            Файлы:
            - OzonatorAgentsClient.exe
            - OzonatorAgentsClient.pyw
