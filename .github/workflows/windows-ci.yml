name: Windows CI (Ozonator Agents Client)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-ci:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Verify source file exists
        run: |
          if (-not (Test-Path 'OzonatorAgentsClient.pyw')) {
            throw 'Missing file: /OzonatorAgentsClient.pyw'
          }

      - name: Install build tool
        id: install
        run: |
          $pipLog = Join-Path $env:RUNNER_TEMP 'ozonator-pip.log'

          python -m pip install --upgrade pip *>&1 | Tee-Object -FilePath $pipLog
          if ($LASTEXITCODE -ne 0) { throw 'pip upgrade failed' }

          python -m pip install pyinstaller *>&1 | Tee-Object -FilePath $pipLog -Append
          $ok = ($LASTEXITCODE -eq 0)
          "ok=$($ok.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Syntax check
        id: syntax
        if: always() && steps.install.outputs.ok == 'true'
        continue-on-error: true
        run: |
          $syntaxLog = Join-Path $env:RUNNER_TEMP 'ozonator-syntax.log'
          python -m py_compile OzonatorAgentsClient.pyw *>&1 | Tee-Object -FilePath $syntaxLog
          $ok = ($LASTEXITCODE -eq 0)
          "ok=$($ok.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build exe (PyInstaller)
        id: build
        if: always() && steps.install.outputs.ok == 'true'
        continue-on-error: true
        run: |
          $buildLog = Join-Path $env:RUNNER_TEMP 'ozonator-build.log'

          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "OzonatorAgentsClient" `
            --hidden-import=tkinter `
            --hidden-import=tkinter.ttk `
            --hidden-import=tkinter.messagebox `
            OzonatorAgentsClient.pyw *>&1 | Tee-Object -FilePath $buildLog

          $ok = ($LASTEXITCODE -eq 0)
          "ok=$($ok.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Verify exe exists
        if: always() && steps.build.outputs.ok == 'true'
        run: |
          $exe = Join-Path $PWD 'dist\OzonatorAgentsClient.exe'
          if (-not (Test-Path $exe)) {
            throw 'Build completed but dist\\OzonatorAgentsClient.exe not found'
          }

      - name: Upload build artifact
        if: always() && steps.build.outputs.ok == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ozonator-agents-client-windows
          path: dist\OzonatorAgentsClient.exe
          if-no-files-found: error
