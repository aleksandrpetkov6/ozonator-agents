name: Windows CI (Ozonator Agents Client)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-ci:
    runs-on: windows-latest

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Prepare folders
        run: |
          New-Item -ItemType Directory -Force -Path logs, artifacts | Out-Null

      - name: Verify source file exists
        run: |
          if (-not (Test-Path 'OzonatorAgentsClient.pyw')) {
            throw 'Missing file: /OzonatorAgentsClient.pyw'
          }

      - name: Install build tool
        id: install
        run: |
          python -m pip install --upgrade pip *>&1 | Tee-Object -FilePath logs\pip.log
          if ($LASTEXITCODE -ne 0) { throw 'pip upgrade failed' }

          python -m pip install pyinstaller *>&1 | Tee-Object -FilePath logs\pip.log -Append
          $ok = ($LASTEXITCODE -eq 0)
          "ok=$($ok.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Syntax check
        id: syntax
        if: always() && steps.install.outputs.ok == 'true'
        continue-on-error: true
        run: |
          python -m py_compile OzonatorAgentsClient.pyw *>&1 | Tee-Object -FilePath logs\syntax.log
          $ok = ($LASTEXITCODE -eq 0)
          "ok=$($ok.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Build exe (PyInstaller)
        id: build
        if: always() && steps.install.outputs.ok == 'true'
        continue-on-error: true
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --onefile `
            --windowed `
            --name "OzonatorAgentsClient" `
            --hidden-import=tkinter `
            --hidden-import=tkinter.ttk `
            --hidden-import=tkinter.messagebox `
            OzonatorAgentsClient.pyw *>&1 | Tee-Object -FilePath logs\build.log

          $ok = ($LASTEXITCODE -eq 0)
          "ok=$($ok.ToString().ToLower())" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Collect artifact
        id: collect
        if: always() && steps.build.outputs.ok == 'true'
        continue-on-error: true
        run: |
          $exe = Join-Path $PWD 'dist\OzonatorAgentsClient.exe'
          if (-not (Test-Path $exe)) {
            throw 'Build completed but dist\\OzonatorAgentsClient.exe not found'
          }

          Copy-Item $exe 'artifacts\OzonatorAgentsClient.exe' -Force
          Copy-Item 'OzonatorAgentsClient.pyw' 'artifacts\OzonatorAgentsClient.pyw' -Force

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ozonator-agents-client-windows
          path: |
            artifacts\OzonatorAgentsClient.exe
            artifacts\OzonatorAgentsClient.pyw
            logs\pip.log
            logs\syntax.log
            logs\build.log
          if-no-files-found: warn
